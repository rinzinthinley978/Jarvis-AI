<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>J.A.R.V.I.S. Core Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { background: #01080e; font-family: 'Orbitron', sans-serif; overflow: hidden; color: #00d9ff; }
        .hud-border { border: 1px solid rgba(0, 217, 255, 0.2); background: rgba(0, 217, 255, 0.02); backdrop-filter: blur(10px); }
        canvas { filter: drop-shadow(0 0 10px #00d9ff); }
    </style>
</head>
<body class="flex items-center justify-center h-screen">
    <div class="relative w-[1000px] h-[700px] hud-border p-10 flex flex-col items-center">
        <div class="w-full flex justify-between text-[10px] tracking-widest opacity-40 mb-10">
            <span>CORE STATUS: OPTIMAL</span>
            <span id="clock">00:00:00</span>
            <span>OS VERSION: 2026.4.1</span>
        </div>

        <div class="relative flex items-center justify-center">
            <canvas id="visualizer" width="500" height="500"></canvas>
            <div class="absolute w-32 h-32 rounded-full border-4 border-cyan-500/30 flex items-center justify-center">
                <div class="w-24 h-24 rounded-full border border-cyan-400 border-dashed animate-spin"></div>
            </div>
        </div>

        <div class="mt-10 text-center">
            <p id="status" class="text-[10px] tracking-[0.6em] text-cyan-700 mb-2">SYSTEM STANDBY</p>
            <p id="output" class="text-xl font-bold uppercase tracking-tighter text-white max-w-2xl"></p>
        </div>
    </div>

    <script>
        const socket = io();
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        let audioCtx, analyser, dataArray, source;

        // Initialize Audio Visualizer on first click
        window.onclick = () => {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                source = audioCtx.createMediaStreamSource(stream);
                source.connect(analyser);
                analyser.fftSize = 128;
                const bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
                draw();
            });
        };

        function draw() {
            requestAnimationFrame(draw);
            analyser.getByteFrequencyData(dataArray);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = 80;

            for (let i = 0; i < dataArray.length; i++) {
                const barHeight = dataArray[i] * 0.6;
                const angle = (i * 2 * Math.PI) / dataArray.length;
                const x1 = centerX + Math.cos(angle) * radius;
                const y1 = centerY + Math.sin(angle) * radius;
                const x2 = centerX + Math.cos(angle) * (radius + barHeight);
                const y2 = centerY + Math.sin(angle) * (radius + barHeight);

                ctx.strokeStyle = `rgba(0, 217, 255, ${barHeight / 100})`;
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            }
        }

        socket.on('ui_update', (data) => {
            if(data.type === 'status') document.getElementById('status').innerText = data.msg.toUpperCase();
            if(data.type === 'text') document.getElementById('output').innerText = data.msg;
        });

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
